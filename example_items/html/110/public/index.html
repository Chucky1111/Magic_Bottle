<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玻璃球游戏</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title"><i class="fas fa-glass-whiskey"></i> 玻璃球游戏</h1>
            <p class="subtitle">探索晶莹剔透的物理世界</p>
        </header>

        <main class="main-content">
            <div class="game-area">
                <canvas id="gameCanvas" width="800" height="500"></canvas>
                <div class="controls">
                    <button id="addBallBtn" class="btn btn-primary">
                        <i class="fas fa-plus-circle"></i> 添加玻璃球
                    </button>
                    <button id="clearBtn" class="btn btn-secondary">
                        <i class="fas fa-trash"></i> 清空
                    </button>
                    <button id="gravityBtn" class="btn btn-toggle">
                        <i class="fas fa-magnet"></i> 重力: <span id="gravityStatus">开</span>
                    </button>
                    <div class="slider-container">
                        <label for="frictionSlider"><i class="fas fa-tachometer-alt"></i> 摩擦力:</label>
                        <input type="range" id="frictionSlider" min="0" max="100" value="10">
                        <span id="frictionValue">0.10</span>
                    </div>
                </div>
            </div>

            <div class="info-panel">
                <div class="panel">
                    <h2><i class="fas fa-info-circle"></i> 游戏说明</h2>
                    <p>点击"添加玻璃球"在随机位置生成一个玻璃球。玻璃球会受重力影响下落并相互碰撞。</p>
                    <p>拖动玻璃球可以将其扔出。调整摩擦力改变运动衰减。</p>
                </div>
                <div class="panel">
                    <h2><i class="fas fa-chart-bar"></i> 状态</h2>
                    <div class="stats">
                        <div class="stat">
                            <span class="stat-label">玻璃球数量:</span>
                            <span id="ballCount" class="stat-value">0</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">碰撞次数:</span>
                            <span id="collisionCount" class="stat-value">0</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">帧率:</span>
                            <span id="fps" class="stat-value">60</span>
                        </div>
                    </div>
                </div>
                <div class="panel">
                    <h2><i class="fas fa-palette"></i> 风格特色</h2>
                    <p>设计采用玻璃态美学，强调透明度、折射与光影效果。色彩灵感来自清晨露珠与水晶棱镜。</p>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>玻璃球游戏 &copy; 2025 | 使用 TypeScript 与 Canvas 构建 | 物理引擎模拟</p>
        </footer>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
